$kind: http-request
url: "{{baseUrl}}/cards"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: "{\r

    \  \"externalId\": \"base1-5\",\r

    \  \"name\": \"Pikachu\",\r

    \  \"setName\": \"Base Set\",\r

    \  \"language\": \"EN\",\r

    \  \"rarity\": \"RARE_HOLO\"\r

    }"
scripts:
  - type: afterResponse
    code: "pm.test(\"Status code is 200 or 201\", function () {\r

      \    pm.expect(pm.response.code).to.be.oneOf([200, 201]);\r

      });\r

      \r

      const json = pm.response.json();\r

      \r

      pm.collectionVariables.set(\"cardId\", json.id);\r

      \r

      pm.test(\"cardId saved\", function () {\r

      \    pm.expect(json.id).to.exist;\r

      });"
    language: text/javascript
order: 1000
